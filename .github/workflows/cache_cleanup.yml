name: cleanup caches and artifacts by a branch
on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Delete PR caches
        run: |
          gh extension install actions/gh-actions-cache

          REPO=${{ github.repository }}
          BRANCH=refs/pull/${{ github.event.pull_request.number }}/merge

          echo "Fetching list of cache keys"
          cacheKeysForPR=$(gh actions-cache list -R $REPO -B $BRANCH | cut -f 1)

          set +e
          echo "Deleting caches..."
          for cacheKey in $cacheKeysForPR; do
              gh actions-cache delete $cacheKey -R $REPO -B $BRANCH --confirm
          done
          echo "Done"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete PR artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          echo "Fetching workflow runs for PR #${PR_NUMBER}..."
          run_ids=$(gh api "repos/${REPO}/actions/runs" \
            --paginate \
            -q ".workflow_runs[] | select(.pull_requests[].number == ${PR_NUMBER}) | .id")

          echo "Deleting artifacts from runs: ${run_ids}"
          for run_id in $run_ids; do
            artifact_ids=$(gh api "repos/${REPO}/actions/runs/${run_id}/artifacts" \
              --paginate -q '.artifacts[].id')
            for artifact_id in $artifact_ids; do
              gh api --method DELETE "repos/${REPO}/actions/artifacts/${artifact_id}"
            done
          done
          echo "Done"
