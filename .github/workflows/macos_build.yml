name: Macos Build

on:
  push:
    paths-ignore:
      # remove non sitl and Chibios HAL
      - 'libraries/AP_HAL_ESP32/**'
      - 'libraries/AP_HAL_Linux/**'
      - 'libraries/AP_HAL_QURT/**'
      # remove all Tools except build scripts
      - 'Tools/**'
      - '!Tools/environment_install/install-prereqs-mac.sh'
      - '!Tools/ardupilotwaf/**'
      # Remove autotests stuff
      - 'Tools/autotest/**'
      # Remove markdown files as irrelevant
      - '**.md'
      # Remove dotfile at root directory
      - '.dir-locals.el'
      - '.dockerignore'
      - '.editorconfig'
      - '.flake8'
      - '.gitattributes'
      - '.github'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - '.pydevproject'
      - '.valgrind-suppressions'
      - '.valgrindrc'
      - 'Dockerfile'
      - 'Vagrantfile'
      - 'Makefile'
      # Remove some directories check
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      # Remove change on other workflows
      - '.github/**'
      - '!.github/workflows/macos_build.yml'  # except this one


  pull_request:
    paths-ignore:
      # remove non sitl and Chibios HAL
      - 'libraries/AP_HAL_ESP32/**'
      - 'libraries/AP_HAL_Linux/**'
      - 'libraries/AP_HAL_QURT/**'
      # remove all Tools except build scripts
      - 'Tools/**'
      - '!Tools/environment_install/install-prereqs-mac.sh'
      - '!Tools/ardupilotwaf/**'
      # Remove autotests stuff
      - 'Tools/autotest/**'
      # Remove markdown files as irrelevant
      - '**.md'
      # Remove dotfile at root directory
      - '.dir-locals.el'
      - '.dockerignore'
      - '.editorconfig'
      - '.flake8'
      - '.gitattributes'
      - '.github'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - '.pydevproject'
      - '.valgrind-suppressions'
      - '.valgrindrc'
      - 'Dockerfile'
      - 'Vagrantfile'
      - 'Makefile'
      # Remove some directories check
      - '.vscode/**'
      - '.github/ISSUE_TEMPLATE/**'
      # Remove change on other workflows
      - '.github/**'
      - '!.github/workflows/macos_build.yml'  # except this one

  workflow_dispatch:

concurrency:
  group: ci-${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # checkout; jobs that save ccache add actions:write per-job

jobs:
  build:
    permissions:
      contents: read
      actions: write  # save-ccache prunes the previous cache entry
    runs-on: macos-latest
    strategy:
      fail-fast: false  # don't cancel if a job from the matrix fails
      matrix:
        config: [
            sitl,
            CubeOrange,
        ]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Install Prerequisites
        shell: bash
        run: |
          if [[ ${{ matrix.config }} == "sitl" ]]; then
            export DO_AP_STM_ENV=0
          fi
          Tools/environment_install/install-prereqs-mac.sh -y
          source ~/.bash_profile
      - uses: ./.github/actions/setup-ccache
        with:
          key-suffix: ${{ matrix.config }}
      - name: test build ${{matrix.config}}
        env:
          CI_BUILD_TARGET: ${{matrix.config}}
        shell: bash
        run: |
          source ~/.bash_profile
          PATH="/github/home/.local/bin:$PATH"
          echo $PATH
          ./waf configure --board ${{matrix.config}}
          ./waf
          ./waf configure --board ${{matrix.config}} --debug
          ./waf
          ccache -s
          ccache -z
      - uses: ./.github/actions/save-ccache
        with:
          key-suffix: ${{ matrix.config }}
