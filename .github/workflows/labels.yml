name: ci

# workflow_run is used intentionally here: the elevated-permission step runs
# in the base-repo context but never checks out PR code, so it is safe.
on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: ["Labels Trigger"]
    types:
      - completed

permissions: {}

concurrency:
  group: labels-apply-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  labels-by-language:
    name: labels-by-language
    runs-on: ubuntu-slim
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write  # So we can add labels to the pull request
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            // For same-repo PRs the pull_requests array is populated directly.
            // For fork PRs it is empty, so fall back to a commit-SHA lookup.
            let prNumber;

            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              prNumber = prs[0].number;
            } else {
              // For fork PRs, commits don't exist in the base repo history so
              // listPullRequestsAssociatedWithCommit returns empty. Use the
              // head owner + branch from the workflow_run payload instead.
              const headOwner = context.payload.workflow_run.head_repository.owner.login;
              const headBranch = context.payload.workflow_run.head_branch;
              const result = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${headOwner}:${headBranch}`,
                state: 'open',
              });
              if (result.data.length === 0) {
                core.warning(`No open PR found for ${headOwner}:${headBranch}`);
                return;
              }
              prNumber = result.data[0].number;
            }

            const filenames = (await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            })).map(file => file.filename);
            console.log(filenames);

            const vehicle_labels = {
              AntennaTracker: 'AntennaTracker',
              ArduCopter: 'Copter',
              ArduPlane: 'Plane',
              ArduSub: 'Sub',
              Blimp: 'Blimp',
              Rover: 'Rover',
            };

            const vehicle_sim_labels = {
              Helicopter: 'TradHeli',
              QuadPlane: 'VTOL-Plane',
              Sailboat: 'Sailboat',
              Blimp: 'Blimp',
              Plane: 'Plane',
              Rover: 'Rover',
              Submarine: 'Sub',
            };

            const labels = new Set();
            for (const filename of filenames) {
              // Generic checks
              if (filename.endsWith('.lua')) labels.add('Scripting');
              else if (filename.endsWith('.py')) labels.add('Python');

              if (filename.startsWith('libraries/AP_ExternalAHRS')) labels.add('ExternalAHRS');
              else if (filename.startsWith('libraries/AP_Compass')) labels.add('Compass');
              else if (filename.startsWith('libraries/AP_NavEKF')) labels.add('EKF');
              else if (filename.startsWith('libraries/AP_HAL_Linux')) labels.add('Linux');
              else if (filename.startsWith('libraries/GCS_MAVLink')) labels.add('MAVLink');
              else if (filename.startsWith('libraries/SITL')) labels.add('SITL');
              else if (filename.startsWith('Tools/AP_Periph')) labels.add('AP_Periph');
              else if (filename.startsWith('.github/workflows')) labels.add('CI');

              // Specific/niche vehicle checks
              if (
                filename.startsWith('ArduPlane/quadplane') ||
              ) {
                labels.add('VTOL-Plane');
                continue;
              } else if (
                filename == 'ArduCopter/heli.cpp' ||
                filename.startsWith('Tools/autotest/default_params/copter-heli') ||
                filename.startsWith('libraries/AP_Motors/AP_MotorsHeli')
              ) {
                labels.add('TradHeli');
                continue;
              } else if (
                filename.startsWith('Rover/sailboat') ||
              ) {
                labels.add('Sailboat');
                continue;
              } else if (
                filename.startsWith('libraries/AP_Motors/AP_Motors6DOF')
              ) {
                labels.add('Sub');
                continue;
              }

              var specific = false;
              for (const [vehicle, label] of Object.entries(vehicle_sim_labels)) {
                if (
                  filename == `Tools/autotest/${vehicle.toLowerCase()}.py` ||
                  filename.startswith(`Tools/autotest/default_params/${vehicle.toLowerCase()}`) ||
                  filename.startsWith(`libraries/SITL/SIM_${vehicle}`)
                ) {
                  labels.add(label);
                  specific = true;
                  break;
                }
              }

              if (specific) continue;

              // General vehicle checks
              for (const [vehicle, label] of Object.entries(vehicle_labels)) {
                if (
                  filename.startsWith(vehicle) ||
                  filename.startsWith(`Tools/autotest/${vehicle}_Test`) ||
                  filename == `Tools/autotest/${vehicle.toLowerCase()}.py`
                ) {
                  labels.add(label);
                  break;
                }
              }
            }
            console.log(labels);

            if (labels.size > 0) {
              github.rest.issues.addLabels({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: Array.from(labels),
              });
            }
