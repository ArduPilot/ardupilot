name: ci

on:
  pull_request_target:  # pull_request_target, NOT pull_request
    types: [opened, synchronize, reopened]

jobs:
  labels-by-language:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write  # So we can add labels to the pull request
    steps:  # Do NOT "uses: actions/checkout" here!
      - uses: actions/github-script@v9
        with:
          script: |
            const filenames = (await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            })).map(file => file.filename);
            console.log(filenames);

            const vehicle_labels = {
              AntennaTracker: 'AntennaTracker',
              ArduCopter: 'Copter',
              ArduPlane: 'Plane',
              ArduSub: 'Sub',
              Blimp: 'Blimp',
              Rover: 'Rover',
            };

            const vehicle_sim_labels = {
              Helicopter: 'TradHeli',
              QuadPlane: 'VTOL-Plane',
              Sailboat: 'Sailboat',
              Blimp: 'Blimp',
              Plane: 'Plane',
              Rover: 'Rover',
              Submarine: 'Sub',
            };

            const labels = new Set();
            for (const filename of filenames) {
              // Generic checks
              if (filename.endsWith('.lua')) labels.add('Scripting');
              else if (filename.endsWith('.py')) labels.add('Python');

              if (filename.startsWith('libraries/AP_ExternalAHRS')) labels.add('ExternalAHRS');
              else if (filename.startsWith('libraries/AP_Compass')) labels.add('Compass');
              else if (filename.startsWith('libraries/AP_NavEKF')) labels.add('EKF');
              else if (filename.startsWith('libraries/AP_HAL_Linux')) labels.add('Linux');
              else if (filename.startsWith('libraries/GCS_MAVLink')) labels.add('MAVLink');
              else if (filename.startsWith('libraries/SITL')) labels.add('SITL');
              else if (filename.startsWith('Tools/AP_Periph')) labels.add('AP_Periph');
              else if (filename.startsWith('.github/workflows')) labels.add('CI');

              // Specific/niche vehicle checks
              if (
                filename.startsWith('ArduPlane/quadplane') ||
              ) {
                labels.add('VTOL-Plane');
                continue;
              } else if (
                filename == 'ArduCopter/heli.cpp' ||
                filename.startsWith('Tools/autotest/default_params/copter-heli') ||
                filename.startsWith('libraries/AP_Motors/AP_MotorsHeli')
              ) {
                labels.add('TradHeli');
                continue;
              } else if (
                filename.startsWith('Rover/sailboat') ||
              ) {
                labels.add('Sailboat');
                continue;
              }

              var specific = false;
              for (const [vehicle, label] of Object.entries(vehicle_sim_labels)) {
                if (
                  filename == `Tools/autotest/${vehicle.toLowerCase()}.py` ||
                  filename.startswith(`Tools/autotest/default_params/${vehicle.toLowerCase()}`) ||
                  filename.startsWith(`libraries/SITL/SIM_${vehicle}`)
                ) {
                  labels.add(label);
                  specific = true;
                  break;
                }
              }

              if (specific) continue;

              // General vehicle checks
              for (const [vehicle, label] of Object.entries(vehicle_labels)) {
                if (
                  filename.startsWith(vehicle) ||
                  filename.startsWith(`Tools/autotest/${vehicle}_Test`) ||
                  filename == `Tools/autotest/${vehicle.toLowerCase()}.py`
                ) {
                  labels.add(label);
                  break;
                }
              }
            }
            console.log(labels);

            if (labels.size > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: Array.from(labels),
              })
            }
