[tool.ruff]
target-version = "py310"
lint.ignore = [
    "E402",  # module-import-not-at-top-of-file
]
lint.extend-select = [
    "I",    # isort
    "TID",  # flake8-tidy-imports
]
lint.flake8-tidy-imports.ban-relative-imports = "all"
lint.per-file-ignores."Tools/autotest/autotest.py" = ["I001"]  # unsorted-imports

[tool.ruff.lint.isort]
force-single-line = true
lines-between-types = 1
known-first-party = [
    "annotate_params",
    "antennatracker",
    "arducopter",
    "balancebot",
    "blimp",
    "board_list",
    "build_binaries_history",
    "build_script_base",
    "controller",
    "dma_resolver",
    "emit",
    "emit_md",
    "examples",
    "extract_param_defaults",
    "gen_stable",
    "generate_manifest",
    "hal_common",
    "helicopter",
    "jsonemit",
    "mdemit",
    "param",
    "param_check",
    "pysim",
    "quadplane",
    "rover",
    "sailboat",
    "vehicle_test_suite",
    "waflib",
]

[tool.isort]
profile = "black"
skip = ["./modules/", "./build/"]
force_single_line = true
lines_between_types = 1
known_first_party = [
    "annotate_params",
    "antennatracker",
    "arducopter",
    "blimp",
    "board_list",
    "build_binaries_history",
    "build_script_base",
    "controller",
    "dma_resolver",
    "emit",
    "emit_md",
    "extract_param_defaults",
    "gen_stable",
    "generate_manifest",
    "hal_common",
    "helicopter",
    "jsonemit",
    "mdemit",
    "param",
    "param_check",
    "pysim",
    "quadplane",
    "rover",
    "sailboat",
    "vehicle_test_suite",
    "waflib",
]

[tool.black]
line-length = 120
skip-string-normalization = true

[tool.mypy]
ignore_missing_imports = true
exclude = [
    'modules/',
    'build/',
    'cmake-build-debug/',
    '/setup\.py$'
]
