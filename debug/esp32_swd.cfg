# Specify the debug adapter driver
adapter driver cmsis-dap-tcp
# Set the IP address of your ESP32-S3
cmsis_dap_tcp host 192.168.42.190
cmsis_dap_tcp port 4441

# Tell OpenOCD to use the SWD protocol (not JTAG)
transport select swd

# Target configuration (adjust for your specific STM32 chip)
source [find target/stm32h7x.cfg]

# Optional: Adjust adapter speed
adapter speed 1000
